<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asia Wine Review</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #111111;
    --white: #FFFFFF;
    --jade: #3D6B5E;
  }

  html, body {
    height: 100%;
    background: var(--white);
    color: var(--black);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 3rem 2rem;
    position: relative;
  }

  /* Corner marks */
  .corner {
    position: fixed;
    width: 18px;
    height: 18px;
    z-index: 1;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: var(--jade);
    opacity: 0;
    animation: fadeIn 1.4s ease 0.6s forwards;
  }
  .corner::before { width: 1px; height: 100%; }
  .corner::after  { width: 100%; height: 1px; }

  .corner-tl { top: 2.5rem; left: 2.5rem; }
  .corner-tl::before { top: 0; left: 0; }
  .corner-tl::after  { top: 0; left: 0; }

  .corner-tr { top: 2.5rem; right: 2.5rem; }
  .corner-tr::before { top: 0; right: 0; }
  .corner-tr::after  { top: 0; right: 0; }

  .corner-bl { bottom: 2.5rem; left: 2.5rem; }
  .corner-bl::before { bottom: 0; left: 0; }
  .corner-bl::after  { bottom: 0; left: 0; }

  .corner-br { bottom: 2.5rem; right: 2.5rem; }
  .corner-br::before { bottom: 0; right: 0; }
  .corner-br::after  { bottom: 0; right: 0; }

  /* Container */
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 900px;
    width: 100%;
  }

  /* Logo */
  .logo {
    width: clamp(200px, 50vw, 320px);
    opacity: 0;
    animation: riseIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
  }

  /* Divider */
  .divider {
    width: 1px;
    height: 2.5rem;
    background: linear-gradient(to bottom, transparent, var(--jade), transparent);
    margin: 2.2rem auto;
    opacity: 0;
    animation: fadeIn 1s ease 0.7s forwards;
  }

  /* Tagline — Georgia heading */
  .tagline {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(1.3rem, 3vw, 1.7rem);
    font-style: normal;
    font-weight: normal;
    color: var(--jade);
    line-height: 1.55;
    max-width: 860px;
    opacity: 0;
    animation: riseIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.85s forwards;
  }

  .tagline-sub {
    font-family: 'Lato', sans-serif;
    font-size: clamp(1rem, 1.8vw, 1.2rem);
    font-weight: 300;
    color: var(--black);
    line-height: 1.7;
    max-width: 860px;
    margin-top: 0.85rem;
    opacity: 0;
    animation: riseIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.95s forwards;
  }

  /* Launch — Lato */
  .launch {
    font-family: 'Lato', sans-serif;
    font-size: 1.2rem;
    font-weight: 400;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--black);
    margin-top: 1.4rem;
    opacity: 0;
    animation: riseIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
   white-space: nowrap;
  }

  /* Founding member offer */
  .offer {
   margin-top: 1.5rem;
    font-family: 'Lato', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--jade);
    margin-top: 0.6rem;
    opacity: 0;
    animation: riseIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) 1.1s forwards;
  }

  /* Form */
  .form-wrap {
    margin-top: 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    width: 100%;
    max-width: 480px;
    opacity: 0;
    animation: riseIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
  }

  .form-row {
    display: flex;
    width: 100%;
    border: 1px solid rgba(61, 107, 94, 0.35);
    overflow: hidden;
    transition: border-color 0.3s ease;
  }

  .form-row:focus-within {
    border-color: var(--jade);
  }

  .form-row input {
    flex: 1;
    padding: 0.85rem 1rem;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Lato', sans-serif;
    font-size: 0.72rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--black);
  }

  .form-row input::placeholder {
    color: var(--black);
    letter-spacing: 0.12em;
    font-size: 0.65rem;
    text-transform: uppercase;
    opacity: 0.4;
  }

  .form-row button {
    padding: 0.85rem 1.2rem;
    background: var(--jade);
    border: none;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--white);
    transition: opacity 0.3s ease;
    white-space: nowrap;
  }

  .form-row button:hover {
    opacity: 0.85;
  }

  .form-note {
   margin-top: 0.8rem;
    font-family: 'Lato', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--black);
  }

  .success-msg {
    display: none;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--jade);
    letter-spacing: 0.02em;
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (max-width: 480px) {
    .corner { width: 14px; height: 14px; }
    .corner-tl, .corner-tr { top: 1.5rem; }
    .corner-bl, .corner-br { bottom: 1.5rem; }
    .corner-tl, .corner-bl { left: 1.5rem; }
    .corner-tr, .corner-br { right: 1.5rem; }
  }
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="container">

<img class="logo" src="https://raw.githubusercontent.com/jacleneliew-del/Asia-Wine-Review/main/logo.png" alt="Asia Wine Review" />
 
  <div class="divider"></div>

  <p class="tagline">The first wine critic platform built for the Asian palate.</p>
  <p class="tagline-sub">A credentialed panel of Asian wine critics.</p>
  <p class="launch">Launching September 2026</p>

  <div class="form-wrap">
   <form action="https://app.kit.com/forms/9443131/subscriptions" method="post" target="_blank">
  <p class="offer">Founding Members Lock In Their Rate For Life</p>
  <div class="form-row">
    <input type="email" name="email_address" placeholder="Email address" required />
    <button type="submit">Join the list</button>
  </div>
  <p class="form-note">First access · Lifetime discount</p>
</form>
</div>
 
</body>
</html>
